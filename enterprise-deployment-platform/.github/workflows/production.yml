name: Production deploy (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  verify:
    name: Re-run CI gate
    uses: ./.github/workflows/ci.yml
    # Inherit secrets so the shared env is available.
    secrets: inherit

  deploy:
    name: Deploy to production
    needs: verify
    runs-on: ubuntu-latest
    # GitHub environment "production" requires manual reviewer approval — the
    # deploy does NOT fire automatically on merge. Use this to enforce the
    # "promote to production" gate from the deployment plan.
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Post-deploy smoke (GET /api/health)
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            echo "attempt $i: $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          echo "❌ /api/health never returned 200 after 5 attempts"
          exit 1
