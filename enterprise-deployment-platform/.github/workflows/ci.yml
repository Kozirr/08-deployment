name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy DB URLs so `prisma generate` and `next build` succeed without a live DB.
  # The schema is parsed but no queries run at build time.
  POSTGRES_PRISMA_URL: postgres://ci:ci@localhost:5432/ci?schema=public
  POSTGRES_URL_NON_POOLING: postgres://ci:ci@localhost:5432/ci?schema=public
  DATABASE_URL: postgres://ci:ci@localhost:5432/ci?schema=public
  JWT_ACCESS_SECRET: ci-access-secret-not-for-production
  JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production
  WEBHOOK_SECRET: ci-webhook-secret-not-for-production
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run lint:css

      - name: TypeScript
        run: npm run typecheck

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build
