# Local prod-parity stack. Runs the standalone Next build against Postgres 16
# so the Dockerfile can be validated without touching Vercel.
# Usage:
#   docker compose up -d db
#   DATABASE_URL=postgres://tempo:tempo@localhost:5432/tempo npx prisma migrate deploy
#   ALLOW_SEED=true DATABASE_URL=... npm run db:seed
#   docker compose up --build app

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tempo
      POSTGRES_PASSWORD: tempo
      POSTGRES_DB: tempo
    ports:
      - '5432:5432'
    volumes:
      - tempo-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tempo -d tempo']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_PRISMA_URL: postgres://tempo:tempo@db:5432/tempo
      POSTGRES_URL_NON_POOLING: postgres://tempo:tempo@db:5432/tempo
      DATABASE_URL: postgres://tempo:tempo@db:5432/tempo
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-local-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-dev-refresh-secret-change-me}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-local-dev-webhook-secret-change-me}
    ports:
      - '3000:3000'

volumes:
  tempo-db:
